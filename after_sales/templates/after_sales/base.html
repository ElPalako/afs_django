<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<title>{% block title %}System RMA{% endblock %}</title>

		<script src="https://unpkg.com/htmx.org@1.9.12"></script>

		<script src="https://cdn.tailwindcss.com"></script>

		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							// Możesz tu wpisać dokładny kod HEX z logo Twojej firmy!
							primary: "#2563eb", // Ładny, profesjonalny niebieski
							primaryHover: "#1d4ed8",
						},
					},
				},
			};
		</script>

		<style type="text/tailwindcss">
			@layer base {
				input[type="text"],
				input[type="date"],
				input[type="number"],
				select {
					@apply w-full rounded-md border-gray-300 shadow-sm p-2 border outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all;
				}
				input[type="checkbox"] {
					@apply w-5 h-5 text-primary rounded border-gray-300 focus:ring-primary;
				}
			}
		</style>
	</head>
	<body
		class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col"
	>
		<nav class="bg-white shadow-sm border-b border-gray-200">
			<div
				class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center"
			>
				<div class="font-bold text-xl text-primary flex items-center gap-2">
					<svg
						class="w-6 h-6"
						fill="none"
						stroke="currentColor"
						viewBox="0 0 24 24"
					>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
						></path>
						<path
							stroke-linecap="round"
							stroke-linejoin="round"
							stroke-width="2"
							d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
						></path>
					</svg>
					Service portal
				</div>
			</div>
		</nav>

		<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
			{% block content %} {% endblock content %}
		</main>
	</body>
</html>
