<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<title>{% block title %}Service portal{% endblock %}</title>

		<script src="https://unpkg.com/htmx.org@1.9.12"></script>

		<script src="https://cdn.tailwindcss.com"></script>

		<script>
			tailwind.config = {
				theme: {
					extend: {
						colors: {
							// Możesz tu wpisać dokładny kod HEX z logo Twojej firmy!
							primary: "#2563eb", // Ładny, profesjonalny niebieski
							primaryHover: "#1d4ed8",
						},
					},
				},
			};
		</script>

		<style type="text/tailwindcss">
			@layer base {
				input[type="text"],
				input[type="date"],
				input[type="number"],
				select {
					@apply w-full rounded-md border-gray-300 shadow-sm p-2 border outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all;
				}
				input[type="checkbox"] {
					@apply w-5 h-5 text-primary rounded border-gray-300 focus:ring-primary;
				}
			}
		</style>
	</head>
	<body
		class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col"
	>
		<nav class="bg-white shadow-sm border-b border-gray-300 sticky top-0 z-50">
			<div
				class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center"
			>
				<div class="font-bold text-xl text-primary flex items-center gap-2">
					Service portal
				</div>

				<div class="flex items-center gap-4">
					{% if user.is_authenticated %}
					<span class="text-sm text-gray-500"
						>Cześć,
						<strong class="text-gray-900">{{ user.username }}</strong></span
					>

					<form action="{% url 'logout' %}" method="post" class="inline">
						{% csrf_token %}
						<button
							type="submit"
							class="text-sm font-medium text-red-600 hover:text-red-800 transition-colors"
						>
							Wyloguj się
						</button>
					</form>
					{% endif %}
				</div>
			</div>
		</nav>

		<main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
			{% block content %} {% endblock content %}
		</main>
	</body>
</html>
