<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<title>Nowe Zgłoszenie RMA</title>
	</head>
	<body style="font-family: sans-serif; padding: 20px">
		<h2>Utwórz nowe zgłoszenie serwisowe</h2>

		<form method="POST">
			{% csrf_token %} {{ form.as_p }}
			<button
				type="submit"
				style="padding: 10px 20px; background: blue; color: white; border: none"
			>
				Zapisz Zgłoszenie
			</button>
		</form>
	</body>
</html>
