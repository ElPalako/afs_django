{% extends 'base.html' %} 
{% block title %}Nowe Zgłoszenie - Serviceportal{% endblock %} 
{% block content %}
<div
	class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100"
>
	<h2 class="text-2xl font-extrabold text-gray-900 mb-6">
		Utwórz zgłoszenie serwisowe
	</h2>

	<form
		hx-post="{% url 'create_ticket' %}"
		hx-swap="outerHTML"
		hx-select="form"
		class="space-y-5"
	>
		{% csrf_token %} {% for field in form %}
		<div>
			<label
				for="{{ field.id_for_label }}"
				class="block text-sm font-semibold text-gray-700 mb-1"
			>
				{{ field.label }}
			</label>

			{{ field }} {% if field.errors %}
			<p class="text-red-500 text-sm mt-1 font-medium">{{ field.errors.0 }}</p>
			{% endif %}
		</div>
		{% endfor %}

		<button type="submit" class="btn-submit">Zapisz Zgłoszenie</button>
		<a href="{% url 'ticket_list' %}" class="btn-cancel text-center block">Anuluj</a>
	</form>
</div>
{% endblock content %}
