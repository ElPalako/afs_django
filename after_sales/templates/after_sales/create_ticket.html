{% extends 'after_sales/base.html' %} {% block title %}Nowe Zgłoszenie - Service
portal{% endblock %} {% block content %}
<div
	class="max-w-xl mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100"
>
	<h2 class="text-2xl font-extrabold text-gray-900 mb-6">
		Utwórz zgłoszenie serwisowe
	</h2>

	<form
		hx-post="/nowe-zgloszenie/"
		hx-swap="outerHTML"
		hx-select="form"
		class="space-y-5"
	>
		{% csrf_token %} {% for field in form %}
		<div>
			<label
				for="{{ field.id_for_label }}"
				class="block text-sm font-semibold text-gray-700 mb-1"
			>
				{{ field.label }}
			</label>

			{{ field }} {% if field.errors %}
			<p class="text-red-500 text-sm mt-1 font-medium">{{ field.errors.0 }}</p>
			{% endif %}
		</div>
		{% endfor %}

		<button
			type="submit"
			class="w-full bg-primary hover:bg-primaryHover text-white font-bold py-3 px-4 rounded-lg shadow transition-colors mt-4"
		>
			Zapisz Zgłoszenie
		</button>
	</form>
</div>
{% endblock content %}
