{% extends 'base_auth.html' %}
{% block title %}Hasło zmienione{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100 text-center">
    <div class="text-green-500 mb-4 flex justify-center">
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>

    <h1 class="text-2xl font-bold text-gray-900 mb-2">Sukces!</h1>

    <a href="{% url 'login' %}" class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg">Zaloguj się</a>
</div>
{% endblock %}
