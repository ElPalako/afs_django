{% extends 'base_auth.html' %}
{% block title %}Nowe Hasło{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
    <h1 class="text-2xl font-bold text-center text-gray-900 mb-6">Ustaw nowe hasło</h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
                <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" required 
                       class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                {% if field.errors %}
                    <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg mt-4">
            Zapisz nowe hasło
        </button>
    </form>
</div>
{% endblock %}
