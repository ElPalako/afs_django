{% extends 'base_auth.html' %}

{% block title %}Reset hasła{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Odzyskaj dostęp</h1>
        <p class="text-gray-500 mt-2 text-sm">Podaj adres e-mail powiązany z Twoim kontem. Prześlemy Ci link do zmiany hasła.</p>
    </div>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Adres e-mail</label>
            <input type="email" name="email" required 
                   class="w-full px-4 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg">
            Wyślij link resetujący
        </button>
    </form>
    
    <div class="mt-4 text-center">
        <a href="{% url 'login' %}" class="text-sm text-blue-600 hover:underline">Wróć do logowania</a>
    </div>
</div>
{% endblock %}
